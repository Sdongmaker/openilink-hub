# Production deployment — uses external Postgres & MinIO.
# Copy .env.example to .env and fill in your values before first run.
#
# Required .env variables:
#   DATABASE_URL       - PostgreSQL connection string
#   STORAGE_ENDPOINT   - MinIO/S3 endpoint
#   STORAGE_ACCESS_KEY - MinIO/S3 access key
#   STORAGE_SECRET_KEY - MinIO/S3 secret key
#   SECRET             - token encryption key (must change!)
#   RP_ORIGIN / RP_ID  - WebAuthn origin and relying party ID
#   HUB_PORT           - hub listen port on host (default: 9800)
#   ADMIN_USERNAME     - default admin username (default: admin)
#   ADMIN_PASSWORD     - default admin password (required for auto-seed)

services:
  hub:
    build: .
    restart: on-failure
    ports:
      - "${HUB_PORT:-9800}:9800"
    env_file: .env
    environment:
      LISTEN: ":9800"
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true

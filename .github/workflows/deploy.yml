name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/openilink-hub

            echo "=== git pull ==="
            sudo git pull --ff-only
            echo "HEAD: $(sudo git log --oneline -1)"

            echo "=== docker compose build ==="
            sudo docker compose build hub 2>&1

            echo "=== docker compose up ==="
            sudo docker compose up -d 2>&1

            echo "=== waiting for container to start ==="
            sleep 5

            echo "=== container status ==="
            sudo docker compose ps

            HEALTH=$(sudo docker compose ps --format json | grep -o '"State":"[^"]*"' | head -1)
            echo "Hub state: $HEALTH"

            if sudo docker compose ps | grep -q "running"; then
              echo "=== deploy succeeded ==="
              sudo docker image prune -f
            else
              echo "=== deploy FAILED — container not running ==="
              echo "=== container logs (last 50 lines) ==="
              sudo docker compose logs --tail=50 hub
              exit 1
            fi
